<!DOCTYPE html>
<html>
<head>

        body{
            margin:0;
            font-family:Arial,sans-serif;
            text-align:center;
            background:linear-gradient(to right,#ff9a9e,#fad0c4);
        }

        .card{
            width:500px;
            margin:40px auto;
            background:white;
            padding:20px;
            border-radius:20px;
            box-shadow:0 0 15px gray;
        }

        img{
            width:250px;
            height:250px;
            border-radius:50%;
            border:5px solid hotpink;
        }

        h1{
            color:#ff1493;
        }

        p{
            font-size:18px;
            color:#444;
        }

        button{
            background:#ff1493;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:20px;
            cursor:pointer;
            font-size:18px;
        }

        button:hover{
            background:#e60073;
        }
    </style>
</head>

<body>

<div class="card">

<h1>🎂 Happy Birthday Arati 🎂</h1>
<img src="arati.JPEG " alt="Birthday Image" width="500">

</p>

</p>


</div>

</body>
</html>
